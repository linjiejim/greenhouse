# Greenhouse — one-command self-hosted deploy.
# Postgres + one-shot DB migrate + API (which also serves the web SPA).
#
# Quick start:
#   1) cp .env.example .env && ./scripts/gen-secrets.sh   # fills required secrets
#   2) edit .env — set LLM_BASE_URL / LLM_API_KEY / LLM_MODEL
#   3) docker compose up -d --build
#   4) docker compose exec api pnpm admin:create          # create the first super-admin
#   App is then at http://localhost:3000
#
# The DB credentials default to greenhouse/greenhouse; to change them, set
# POSTGRES_* AND update the DATABASE_URL on the migrate/api services to match.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-greenhouse}
      POSTGRES_USER: ${POSTGRES_USER:-greenhouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenhouse}
    # Bound to loopback so the same file also serves local `pnpm dev`
    # (run just `docker compose up -d postgres`). Not internet-exposed.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-greenhouse} -d ${POSTGRES_DB:-greenhouse}']
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: applies the migration chain, then exits. The API waits for it.
  migrate:
    build: .
    command: ['./node_modules/.bin/drizzle-kit', 'migrate']
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://greenhouse:greenhouse@postgres:5432/greenhouse

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # In-network DB host is the `postgres` service (overrides .env's localhost value).
      DATABASE_URL: postgresql://greenhouse:greenhouse@postgres:5432/greenhouse
      API_PORT: '3000'
    ports:
      - '${PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pg_data:
