packages:
  - 'apps/*'
  - 'packages/*'
  # The Expo mobile app is intentionally NOT a workspace member: its React-Native
  # / React-19 dependency graph would otherwise hoist @types/react@19 into the
  # shared store and break the React-18-typed web/api typecheck. It has its own
  # isolated install (run `pnpm install --ignore-workspace` in apps/mobile).
  - '!apps/mobile'

# Which dependency build scripts may run. pnpm 11 reads this `allowBuilds` map from
# pnpm-workspace.yaml — NOT package.json's old `pnpm.onlyBuiltDependencies`, which
# pnpm 11 silently ignores. true = build (native deps that need compiling).
# The pnpm version is pinned via `packageManager` in package.json.
allowBuilds:
  better-sqlite3: false # unused drizzle driver (we use postgres-js)
  esbuild: true
  isolated-vm: true
