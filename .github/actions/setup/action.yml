name: Workspace setup
description: >
  pnpm + Node 22 (pnpm cache) + frozen workspace install. Run after
  actions/checkout — a local composite action can't check out the repo it
  lives in.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
