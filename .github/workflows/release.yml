name: Release

# Builds & publishes the distributable artifacts. Two triggers:
#   • tag `v*`  → STABLE release: GHCR image `:X.Y.Z` `:X.Y` (+ `:latest` for a
#                 non-prerelease tag) and the browser extension zip attached to
#                 the GitHub Release.
#   • push main → EDGE build: GHCR image `:edge` + `:main-<sha>` only. Never
#                 `:latest`, never a Release asset — main is explicitly unstable.
# The stable/edge split is the machine-readable half of the promise in the README
# "Releases & stability" section. See RELEASING.md.
on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── API + web → single container image on GHCR ──
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags + OCI labels from the git ref.
      #   tag v0.2.0     → 0.2.0, 0.2, latest
      #   tag v0.2.0-rc.1 → 0.2.0-rc.1            (prerelease: no `latest`)
      #   push main      → edge, main-<sha>
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only for now: the `compute` tool's isolated-vm native addon must
          # be verified to cross-compile on arm64 before adding linux/arm64 here
          # (buildx + QEMU). Tracked in RELEASING.md → "Follow-ups".
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            APP_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Browser extension → versioned zip attached to the Release (stable only) ──
  browser:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the asset to the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `package` runs `vite build` then stamps manifest.version from APP_VERSION
      # and zips dist/ → greenhouse-bridge-vX.Y.Z.zip.
      - name: Build & package extension
        run: pnpm --filter @greenhouse/browser package
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Attach zip to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" apps/browser/greenhouse-bridge-*.zip --clobber
