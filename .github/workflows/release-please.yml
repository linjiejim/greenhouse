name: Release Please

# Version automation. On every push to main, release-please reads the Conventional
# Commits since the last tag and maintains a "Release PR" (computed SemVer bump +
# generated CHANGELOG.md). Merging that PR tags `vX.Y.Z` and creates the GitHub
# Release — which is what triggers release.yml to build & publish the artifacts.
# See RELEASING.md.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# One release train at a time; never cancel a run mid-tag.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # A tag pushed by the default GITHUB_TOKEN does NOT cascade to other workflows
      # (GitHub's recursion guard), so release.yml's `on: push: tags` never fires for
      # a release-please tag. A PAT (RELEASE_PLEASE_TOKEN, contents+PRs write) makes
      # the tag push trigger release.yml → stable image + browser zip, automatically.
      # Falls back to GITHUB_TOKEN when the secret is absent: releases still tag &
      # publish notes, but the stable artifacts must then be published by re-pushing
      # the tag manually (RELEASING.md → "Publishing stable artifacts"). Add the PAT
      # to make releases fully hands-off.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
